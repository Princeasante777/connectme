<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let's Chat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f9d58, #34d399);
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .chat-btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1.2rem;
      color: #0f9d58;
      background: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .chat-btn:hover {
      background: #e6ffe6;
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }

      .chat-btn {
        padding: 12px 25px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome 👋</h1>
    <p>Click below to start a conversation with us instantly.</p>

    <!-- WhatsApp link -->
    <a class="chat-btn" href="https://wa.me/233539573712" target="_blank">
      Let's Chat
    </a>
  </div>

</body>
</html>
